<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Needs Market</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
}

header {
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

.products {
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.product {
  background:#fff;
  min-width:250px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#1a73e8;
  font-weight:bold;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#1a73e8;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* ORDER FORM */
.form-box {
  background:#fff;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

</style>
</head>

<body>

<header>PRIVATE NEEDS MARKET</header>

<div class="container">

  <h2>Products</h2>

  <div class="products">

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Soft Pocket Toy</h3>
      <p class="price">₦30,000</p>
      <button onclick="selectProduct('Soft Pocket Toy')">Order</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>Real Feel Model</h3>
      <p class="price">₦28,000</p>
      <button onclick="selectProduct('Real Feel Model')">Order</button>
    </div>

  </div>

  <!-- ORDER FORM -->
  <div class="form-box">
    <h3>Place Order</h3>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Delivery Address"></textarea>

    <input type="text" id="product" placeholder="Selected Product" readonly>

    <button onclick="submitOrder()">Submit Order</button>
  </div>

</div>

<script>

function selectProduct(product){
  document.getElementById("product").value = product;
}

function submitOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let product = document.getElementById("product").value;

  if(!name || !phone || !address || !product){
    alert("Please fill everything");
    return;
  }

  // SAVE ORDER (LOCAL STORAGE)
  let orders = JSON.parse(localStorage.getItem("orders") || "[]");

  orders.push({
    name, phone, address, product,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order saved successfully!");

  // clear form
  document.getElementById("name").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("address").value = "";
  document.getElementById("product").value = "";
}

</script>

</body>
</html>
