<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:20px;
}

.container{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  padding:10px;
}

.product{
  background:#fff;
  border-radius:10px;
  padding:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#1a73e8;
  font-weight:bold;
}

button{
  width:100%;
  padding:8px;
  background:#1a73e8;
  color:#fff;
  border:none;
  border-radius:6px;
}
</style>

</head>

<body>

<header>MY MARKETPLACE</header>

<div class="container">
