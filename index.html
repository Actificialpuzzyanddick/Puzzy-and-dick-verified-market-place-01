<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:20px;
}

.container{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  padding:10px;
}

.product{
  background:#fff;
  border-radius:10px;
  padding:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#1a73e8;
  font-weight:bold;
}

button{
  width:100%;
  padding:8px;
  background:#1a73e8;
  color:#fff;
  border:none;
  border-radius:6px;
  margin-top:5px;
}

/* POPUP */
#orderBox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}
.order-content{
  background:#fff;
  padding:15px;
  margin:40px auto;
  width:90%;
  max-width:400px;
  border-radius:10px;
}
input{
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>

</head>

<body>

<header>MY MARKETPLACE</header>

<div class="container">

<div class="product"><img src="1.jpg"><p class="price">₦35,000</p><button onclick="openOrder('Product 1','₦35,000')">Buy</button></div>

<div class="product"><img src="6.jpg"><p class="price">₦35,000</p><button onclick="openOrder('Product 6','₦35,000')">Buy</button></div>
<div class="product"><img src="7.jpg"><p class="price">₦30,000</p><button onclick="openOrder('Product 7','₦30,000')">Buy</button></div>
<div class="product"><img src="8.jpg"><p class="price">₦40,000</p><button onclick="openOrder('Product 8','₦40,000')">Buy</button></div>

<div class="product"><img src="12.jpg"><p class="price">₦30,000</p><button onclick="openOrder('Product 12','₦30,000')">Buy</button></div>
<div class="product"><img src="13.jpg"><p class="price">₦25,000</p><button onclick="openOrder('Product 13','₦25,000')">Buy</button></div>
<div class="product"><img src="14.jpg"><p class="price">₦30,000</p><button onclick="openOrder('Product 14','₦30,000')">Buy</button></div>
<div class="product"><img src="15.jpg"><p class="price">₦40,000</p><button onclick="openOrder('Product 15','₦40,000')">Buy</button></div>
<div class="product"><img src="16.jpg"><p class="price">₦38,000</p><button onclick="openOrder('Product 16','₦38,000')">Buy</button></div>

</div>

<!-- ORDER POPUP -->
<div id="orderBox">
  <div class="order-content">
    <h3 id="productName"></h3>
    <p id="productPrice" class="price"></p>

    <input id="name" placeholder="Your Name">
    <input id="state" placeholder="Your State">
    <input id="lga" placeholder="Your LGA">
    <input id="phone" placeholder="Phone Number">

    <hr>

    <p><b>Make Payment:</b></p>
    <p>Account Number: <b>8231336539</b></p>
    <p>Bank: <b>Moniepoint</b></p>
    <p>Name: <b>Hamidu Abdulkarimu</b></p>

    <button onclick="sendReceipt()">Send Receipt</button>
    <button onclick="closeOrder()" style="background:#ccc; color:#000;">Cancel</button>
  </div>
</div>

<script>
function openOrder(name, price){
  document.getElementById("orderBox").style.display="block";
  document.getElementById("productName").innerText=name;
  document.getElementById("productPrice").innerText=price;
}

function closeOrder(){
  document.getElementById("orderBox").style.display="none";
}

function sendReceipt(){
  let name=document.getElementById("name").value;
  let state=document.getElementById("state").value;
  let lga=document.getElementById("lga").value;
  let phone=document.getElementById("phone").value;

  if(name=="" || state=="" || lga=="" || phone==""){
    alert("Please fill all details");
    return;
  }

  let product=document.getElementById("productName").innerText;
  let price=document.getElementById("productPrice").innerText;

  let message="NEW ORDER%0A%0A"
    +"Product: "+product+"%0A"
    +"Price: "+price+"%0A%0A"
    +"Name: "+name+"%0A"
    +"State: "+state+"%0A"
    +"LGA: "+lga+"%0A"
    +"Phone: "+phone+"%0A%0A"
    +"I have made payment. Sending receipt now.";

  window.open("https://wa.me/2347078293919?text="+message,"_blank");
}
</script>

</body>
